name: consumer-gki-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-warmed workspace image
        run: docker pull ghcr.io/<owner>/gki-workspace:android15-6.6-latest

      - name: Apply source patch and run incremental build
        run: |
          DOWNSTREAM_ROOT=/workspace/downstream
          docker run --rm \
            -e DOWNSTREAM_ROOT="$DOWNSTREAM_ROOT" \
            -v "$PWD":"$DOWNSTREAM_ROOT" \
            -v "$PWD/.cache":/workspace/.cache \
            -v "$PWD/out":/workspace/out \
            ghcr.io/<owner>/gki-workspace:android15-6.6-latest \
            bash -lc '
              cd "$GKI_SOURCE_ROOT" &&
              git apply "$DOWNSTREAM_ROOT/patches/my-change.patch" &&
              gki-builder build \
                --target-config "$GKI_TARGET_CONFIG" \
                --workspace "$GKI_WORKSPACE_ROOT" \
                --cache-root "$GKI_CACHE_ROOT" \
                --output-root /workspace/out
            '
