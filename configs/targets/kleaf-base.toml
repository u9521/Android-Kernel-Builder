name = "kleaf-base"
base = true

[manifest]
source = "remote"
url = "https://android.googlesource.com/kernel/manifest"
file = "default.xml"
minimal = true
autodetect_deprecated = true

[build]
system = "kleaf"
target = "//common:kernel_{arch}_dist"
warmup_target = "//common:kernel_{arch}"
dist_flag = "dist_dir"
arch = "aarch64"
lto = "thin"

[cache]
repo_dir = "repo"
bazel_dir = "bazel"

[workspace]
source_dir = "android-kernel"
