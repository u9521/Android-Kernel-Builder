name: build-base-image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: Push built image to GHCR
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: android_kernel_builder/docker/base.Dockerfile
          push: ${{ inputs.push_image }}
          tags: ghcr.io/${{ github.repository_owner }}/gki-base:bookworm
          cache-from: type=gha,scope=gki-base-bookworm
          cache-to: type=gha,mode=max,scope=gki-base-bookworm
