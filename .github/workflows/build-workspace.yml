name: build-container-images

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target config name without .toml
        required: true
        default: android15-6.6
      tag:
        description: Image tag suffix
        required: true
        default: android15-6.6-latest

jobs:
  build:
    name: Build and push ${{ matrix.image_name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: workspace
            image_repo: gki-workspace
            dockerfile: .image-package/docker/workspace.Dockerfile
            snapshot_git_projects: ""
          - image_name: snapshot
            image_repo: gki-snapshot
            dockerfile: .image-package/docker/snapshot.Dockerfile
            snapshot_git_projects: common
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve source target definition
        id: target
        run: |
          SOURCE_TARGET_FILE="configs/targets/${{ inputs.target }}.toml"
          if [ ! -f "$SOURCE_TARGET_FILE" ]; then
            echo "::error::Missing source target definition: $SOURCE_TARGET_FILE"
            echo "Available configs:"
            ls configs/targets/*.toml
            exit 1
          fi
          echo "source_target_file=$SOURCE_TARGET_FILE" >> "$GITHUB_OUTPUT"

      - name: Package minimal image context
        run: python3 scripts/package-image.py --output-dir .image-package

      - name: Build and push ${{ matrix.image_name }} image
        run: |
          set -euo pipefail
          extra_build_args=()
          if [ -n "${{ matrix.snapshot_git_projects }}" ]; then
            extra_build_args+=(--build-arg "SNAPSHOT_GIT_PROJECTS=${{ matrix.snapshot_git_projects }}")
          fi

          docker buildx build \
            --file "${{ matrix.dockerfile }}" \
            --build-arg BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/gki-base:bookworm \
            --build-arg SOURCE_TARGET_FILE=${{ steps.target.outputs.source_target_file }} \
            --tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repo }}:${{ inputs.tag }} \
            --push \
            "${extra_build_args[@]}" \
            .image-package
