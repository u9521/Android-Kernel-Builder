name: build-workspace-image

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target config name without .toml
        required: true
        default: android15-6.6
      tag:
        description: Image tag suffix
        required: true
        default: android15-6.6-latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve source target definition
        id: target
        run: |
          SOURCE_TARGET_FILE="configs/targets/${{ inputs.target }}.toml"
          if [ ! -f "$SOURCE_TARGET_FILE" ]; then
            echo "::error::Missing source target definition: $SOURCE_TARGET_FILE"
            echo "Available configs:"
            ls configs/targets/*.toml
            exit 1
          fi
          echo "source_target_file=$SOURCE_TARGET_FILE" >> "$GITHUB_OUTPUT"

      - name: Package minimal image context
        run: python3 scripts/package-image.py --output-dir .image-package

      - name: Build, warm, and push workspace image
        uses: docker/build-push-action@v6
        with:
          context: .image-package
          file: .image-package/docker/workspace.Dockerfile
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/gki-base:bookworm
            SOURCE_TARGET_FILE=${{ steps.target.outputs.source_target_file }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gki-workspace:${{ inputs.tag }}

      - name: Build, warm, and push snapshot image
        uses: docker/build-push-action@v6
        with:
          context: .image-package
          file: .image-package/docker/snapshot.Dockerfile
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/gki-base:bookworm
            SOURCE_TARGET_FILE=${{ steps.target.outputs.source_target_file }}
            SNAPSHOT_GIT_PROJECTS=common
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gki-snapshot:${{ inputs.tag }}
